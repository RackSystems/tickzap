name: tickzap

services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - database
      - redis
    volumes:
      - ./apps/api/src:/tickzap/apps/api/src
      - ./apps/api/.env:/tickzap/apps/api/.env
    ports:
      - "3000:3000"

  ai:
    container_name: ai
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    depends_on:
      - api
    volumes:
      - ./apps/ai/src:/tickzap/apps/ai/src
    ports:
      - "3003:3003"

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    volumes:
      - .:/app
    ports:
      - "5173:5173"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER='tickzap'
      - MINIO_ROOT_PASSWORD='minioadmin'
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # Porta da API
      - "9001:9001" # Porta da Interface Web

  database:
    image: postgres:latest
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'secret'
      POSTGRES_DB: 'tickzap'
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  db_data:
  minio_data:
    name: tickzap_minio_data

networks:
  default:
    name: tickzap_network
    driver: bridge
